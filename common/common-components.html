<!-- Large Image Viewing Modal -->
<div class="modal fade" id="imageModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-fullscreen">
        <div class="modal-content">

            <div class="modal-header">
                <div class="d-flex align-items-center w-100 gap-3">
                    <div id="ImageViewerControlButtons" class="image-modal-controls d-flex align-items-center gap-3">
                        <div class="d-flex gap-2">
                            <button id="imgZoomIn" type="button" class="btn btn-lg btn-secondary controlButton" title="Zoom In">🔍+</button>
                            <button id="imgZoomOut" type="button" class="btn btn-lg btn-secondary controlButton" title="Zoom Out">🔍−</button>
                            <button id="imgReset" type="button" class="btn btn-lg btn-secondary" title="Reset View">Reset</button>
                        </div>
                        <div class="d-flex gap-2">
                            <button id="imgRotateLeft" type="button" class="btn btn-lg btn-secondary controlButton" title="Rotate Left">↺</button>
                            <button id="imgRotateRight" type="button" class="btn btn-lg btn-secondary controlButton" title="Rotate Right">↻</button>
                        </div>
                        <div style="display:grid;grid-template-columns:repeat(3,3.5rem);gap:0.5rem;align-items:center;justify-items:center;">
                            <div></div>
                            <button id="imgUp" type="button" class="btn btn-lg btn-secondary controlButton" title="Pan Up" style="width:3.5rem;height:3.5rem;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">⬆️</button>
                            <div></div>
                            <button id="imgLeft" type="button" class="btn btn-lg btn-secondary controlButton" title="Pan Left" style="width:3.5rem;height:3.5rem;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">⬅️</button>
                            <button id="imgDown" type="button" class="btn btn-lg btn-secondary controlButton" title="Pan Down" style="width:3.5rem;height:3.5rem;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">⬇️</button>
                            <button id="imgRight" type="button" class="btn btn-lg btn-secondary controlButton" title="Pan Right" style="width:3.5rem;height:3.5rem;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">➡️</button>
                        </div>
                    </div>
                    <div class="ms-auto">
                        <button type="button" class="btn btn-sm btn-close" data-bs-dismiss="modal"></button>
                    </div>
                </div>
            </div>

            <div class="modal-body" style="padding:0;">
                <div id="ImageModalContainer" style="width:100%;height:100%;overflow:hidden;touch-action:none;display:flex;align-items:center;justify-content:center;">
                    <img id="ImageModalImg" src="" alt="Image" style="transform-origin: center center; cursor: grab; display:block; max-width:98%; max-height:98%;" />
                </div>
            </div>

        </div>
    </div>
</div>
