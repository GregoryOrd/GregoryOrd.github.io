<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

<title>Happy Birthday!</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../common/main.css"/>
<link rel="stylesheet" href="../common/navbar.css"/>

<script src="../common/responsive.js" defer></script>
<script src="../common/loadHtmlElement.js"></script>

<style>
    html, body {
        min-height: 100%;
        margin: 0;
        padding: 0;
    }

    #confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 0;
    }

    .birthday-page {
        position: relative;
        min-height: calc(100vh - 70px);
        padding: 30px 20px 50px;
        box-sizing: border-box;
        overflow: hidden;
    }

    .birthday-content {
        position: relative;
        z-index: 2;
        max-width: 900px;
        margin: 0 auto;
        padding-top: 50px;
    }

    .birthday-card {
        background: rgba(255, 255, 255, 0.85);
        border-radius: 24px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
        height: 80vh;
        padding: 40px 30px;
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .birthday-card h1 {
        font-size: clamp(2.8rem, 4vw, 4.2rem);
        margin-bottom: 0.6rem;
        color: #dc3c80;
        letter-spacing: 0.05em;
    }

    .birthday-card p {
        font-size: 1.2rem;
        color: #5e3b62;
        margin-bottom: 2rem;
    }

    .cake-scene {
        display: flex;
        justify-content: center;
        position: relative;
        top: 5vh;
        left: 15%;
        margin-top: 20px;
    }

    .cake {
        position: relative;
        width: 270px;
        height: 260px;
        animation: floatCake 4s ease-in-out infinite;
    }

    .cake-layer {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 24px;
        box-shadow: inset 0 6px 0 rgba(255,255,255,0.35);
    }

    .cake-base {
        bottom: 0;
        width: 240px;
        height: 110px;
        background: #f78fb3;
    }

    .cake-middle {
        bottom: 90px;
        width: 210px;
        height: 90px;
        background: #ff9ff3;
    }

    .cake-top {
        bottom: 170px;
        width: 180px;
        height: 68px;
        background: #ff6b6b;
    }

    .frosting {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 220px;
        height: 42px;
        bottom: 135px;
        background: radial-gradient(circle at 50% 10%, #fff6f8 32%, rgba(255, 255, 255, 0));
        border-radius: 50% 50% 20% 20%;
    }

    .candle {
        position: absolute;
        width: 12px;
        left: 47%;
        height: 50px;
        bottom: 235px;
        background: linear-gradient(180deg, #ffe066 0%, #f0932b 100%);
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
        animation: sway 3s ease-in-out infinite;
    }

    .candle:nth-child(1) { left: 78px; animation-delay: -0.2s; }
    .candle:nth-child(2) { left: 122px; animation-delay: -0.5s; }
    .candle:nth-child(3) { left: 166px; animation-delay: -0.3s; }

    .flame {
        position: absolute;
        top: -18px;
        left: 50%;
        width: 16px;
        height: 22px;
        transform: translateX(-50%);
        background: radial-gradient(circle at 50% 30%, #fff8b5 20%, #ffd166 40%, #ff6348 60%, rgba(255, 99, 72, 0));
        border-radius: 50% 50% 45% 45%;
        filter: drop-shadow(0 0 10px rgba(255, 173, 96, 0.65));
        animation: flameFlicker 0.35s infinite ease-in-out;
    }

    .cake-plate {
        position: absolute;
        left: 50%;
        bottom: -18px;
        transform: translateX(-50%);
        width: 280px;
        height: 24px;
        border-radius: 999px;
        background: linear-gradient(90deg, #ffe4e1, #f3c3d1, #ffe4e1);
        box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    }

    .birthday-footer {
        display: block;
        margin-top: 20vh;
        font-size: 1rem;
        color: #8a5d7b;
    }

    @keyframes floatCake {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        50% { transform: translateX(-50%) translateY(-12px); }
    }

    @keyframes sway {
        0%, 100% { transform: translateX(0) rotate(0deg); }
        50% { transform: translateX(-1px) rotate(-1deg); }
    }

    @keyframes flameFlicker {
        0% { transform: translateX(-50%) scale(0.95); opacity: 0.95; }
        50% { transform: translateX(-50%) scale(1.05); opacity: 1; }
        100% { transform: translateX(-50%) scale(0.98); opacity: 0.96; }
    }
</style>

<script>
loadHtmlElement("../mommyDay/mommyDayNavBar.html", "navbar")
</script>
</head>

<body>
<div id="navbar"></div>

<div class="birthday-page">
<canvas id="confetti-canvas"></canvas>
<div class="birthday-content">
<div class="birthday-card text-center">
<h1>Happy Birthday Mom!</h1>
<p>Today is your day — full of joy, sparkles, cake, and all the love in the world. Enjoy every moment!</p>
<div class="cake-scene">
<div class="cake" aria-hidden="true">
<div class="cake-layer cake-top"></div>
<div class="cake-layer cake-middle"></div>
<div class="cake-layer cake-base"></div>
<div class="frosting"></div>
<div class="candle"><span class="flame"></span></div>
<div class="candle"><span class="flame"></span></div>
<div class="candle"><span class="flame"></span></div>
<div class="cake-plate"></div>
</div>
</div>
<span class="birthday-footer">Wishing you an amazing year ahead.</span>
</div>
</div>
</div>

<script>
const confettiCanvas = document.getElementById('confetti-canvas');
const ctx = confettiCanvas.getContext('2d');
let confettiParticles = [];

function resizeCanvas() {
confettiCanvas.width = window.innerWidth;
confettiCanvas.height = window.innerHeight;
}

function randomRange(min, max) {
return Math.random() * (max - min) + min;
}

function createConfetti(count = 140) {
confettiParticles = [];
const colors = ['#ff6b6b', '#ff9ff3', '#ffe066', '#6bc5d2', '#c56cf0'];
for (let i = 0; i < count; i += 1) {
confettiParticles.push({
x: randomRange(0, window.innerWidth),
y: randomRange(-window.innerHeight, 0),
size: randomRange(6, 12),
tilt: randomRange(-10, 10),
color: colors[Math.floor(randomRange(0, colors.length))],
velocity: randomRange(1.2, 3.5),
rotation: randomRange(0, Math.PI * 2),
});
}
}

function drawConfetti() {
ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
confettiParticles.forEach((p) => {
ctx.save();
ctx.translate(p.x, p.y);
ctx.rotate(p.rotation);
ctx.fillStyle = p.color;
ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.35);
ctx.restore();
});
}

function updateConfetti() {
confettiParticles.forEach((p) => {
p.y += p.velocity;
p.x += Math.sin(p.y * 0.01) * 1.2;
p.rotation += 0.04;
if (p.y > window.innerHeight + 20) {
p.y = randomRange(-100, -10);
p.x = randomRange(0, window.innerWidth);
p.velocity = randomRange(1.2, 3.5);
}
});
}

function animationLoop() {
drawConfetti();
updateConfetti();
requestAnimationFrame(animationLoop);
}

window.addEventListener('load', () => {
resizeCanvas();
createConfetti();
animationLoop();
});

window.addEventListener('resize', () => {
resizeCanvas();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
