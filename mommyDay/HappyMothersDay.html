<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

<title>Happy Mother's Day!</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../common/main.css"/>
<link rel="stylesheet" href="../common/navbar.css"/>

<script src="../common/responsive.js" defer></script>
<script src="../common/loadHtmlElement.js"></script>

<style>
    html, body {
        min-height: 100%;
        margin: 0;
        padding: 0;
    }

    #confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 0;
    }

    .mothers-page {
        position: relative;
        min-height: calc(100vh - 70px);
        padding: 30px 20px 50px;
        box-sizing: border-box;
        overflow: hidden;
    }

    .mothers-content {
        position: relative;
        z-index: 2;
        margin: 0 auto;
        max-width: 900px;
        padding-top: 50px;
    }

    .mothers-card {
        background: rgba(255, 255, 255, 0.92);
        border-radius: 26px;
        box-shadow: 0 22px 60px rgba(157, 81, 143, 0.16);
        padding: 42px 34px;
        border: 1px solid rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(14px);
    }

    .mothers-card h1 {
        font-size: clamp(2.8rem, 4vw, 4.4rem);
        margin-bottom: 0.6rem;
        color: #b63ea5;
        letter-spacing: 0.05em;
    }

    .mothers-card p {
        font-size: 1.2rem;
        color: #6f4b77;
        margin-bottom: 2rem;
    }

    .flower-scene {
        display: flex;
        justify-content: center;
        margin-top: 20px;
    }

    .bouquet {
        position: relative;
        width: 240px;
        height: 280px;
        animation: swayBouquet 5s ease-in-out infinite;
    }

    .stem {
        position: absolute;
        bottom: 0;
        width: 12px;
        height: 150px;
        background: linear-gradient(180deg, #7a5d65 0%, #4c2b40 100%);
        border-radius: 8px;
        box-shadow: inset 0 4px 10px rgba(0,0,0,0.12);
    }

    .stem:nth-child(1) { left: 56px; transform: rotate(-8deg); }
    .stem:nth-child(2) { left: 103px; transform: rotate(0deg); }
    .stem:nth-child(3) { left: 150px; transform: rotate(7deg); }

    .flower {
        position: absolute;
        width: 90px;
        height: 90px;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
    }

    .flower::before,
    .flower::after {
        content: '';
        position: absolute;
        width: 46px;
        height: 46px;
        background: #ffb3d9;
        border-radius: 50%;
        box-shadow: inset 0 10px 15px rgba(255,255,255,0.45);
    }

    .flower::before { top: 0; left: 22px; }
    .flower::after { left: 0; top: 22px; }

    .flower-center {
        position: absolute;
        top: 18px;
        left: 18px;
        width: 54px;
        height: 54px;
        background: #ffe066;
        border-radius: 50%;
        box-shadow: 0 0 24px rgba(255, 224, 102, 0.4);
    }

    .flower-1 { top: 10px; left: 35px; transform: scale(1.05); }
    .flower-2 { top: 70px; left: 12px; transform: scale(0.85); }
    .flower-3 { top: 70px; left: 135px; transform: scale(0.95); }

    .heart { 
        position: absolute;
        width: 30px;
        height: 30px;
        background: #ff85d0;
        border-radius: 50% 50% 0 0;
        transform: rotate(-45deg);
        box-shadow: inset 0 6px 10px rgba(255,255,255,0.25);
    }

    .heart::before,
    .heart::after {
        content: '';
        position: absolute;
        width: 30px;
        height: 30px;
        background: #ff85d0;
        border-radius: 50%;
    }

    .heart::before { top: -15px; left: 0; }
    .heart::after { left: 15px; top: 0; }

    .heart-1 { left: 30px; top: 38px; animation: floatHeart 3s ease-in-out infinite; }
    .heart-2 { left: 185px; top: 95px; animation: floatHeart 3.8s ease-in-out infinite; }
    .heart-3 { left: 120px; top: 10px; animation: floatHeart 4.4s ease-in-out infinite; }

    .mothers-footer {
        display: block;
        margin-top: 28px;
        font-size: 1rem;
        color: #79577f;
    }

    @keyframes swayBouquet {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(5px); }
    }

    @keyframes floatHeart {
        0%, 100% { transform: rotate(-45deg) translateY(0); }
        50% { transform: rotate(-45deg) translateY(-10px); }
    }
</style>

<script>
loadHtmlElement("../mommyDay/mommyDayNavBar.html", "navbar")
</script>
</head>

<body>
<div id="navbar"></div>

<div class="mothers-page">
<canvas id="confetti-canvas"></canvas>
<div class="mothers-content">
<div class="mothers-card text-center">
<h1>Happy Mother's Day!</h1>
<p>Thank you for your warmth, your kindness, and the way you make every day spent with you brighter. You are loved beyond words.</p>
<div class="flower-scene" aria-hidden="true">
<div class="bouquet">
<div class="stem"></div>
<div class="stem"></div>
<div class="stem"></div>
<div class="flower flower-1"><div class="flower-center"></div></div>
<div class="flower flower-2"><div class="flower-center"></div></div>
<div class="flower flower-3"><div class="flower-center"></div></div>
<div class="heart heart-1"></div>
<div class="heart heart-2"></div>
<div class="heart heart-3"></div>
</div>
</div>
<span class="mothers-footer">May your day feel as special as everything you do.</span>
</div>
</div>
</div>

<script>
const confettiCanvas = document.getElementById('confetti-canvas');
const ctx = confettiCanvas.getContext('2d');
let petals = [];

function resizeCanvas() {
confettiCanvas.width = window.innerWidth;
confettiCanvas.height = window.innerHeight;
}

function randomRange(min, max) {
return Math.random() * (max - min) + min;
}

function createPetals(count = 140) {
petals = [];
const colors = ['#ffb3d9', '#ff8ed0', '#f8a1ff', '#ffd1e8', '#ffdbac'];
for (let i = 0; i < count; i += 1) {
petals.push({
x: randomRange(0, window.innerWidth),
y: randomRange(-window.innerHeight, 0),
radius: randomRange(4, 9),
color: colors[Math.floor(randomRange(0, colors.length))],
velocity: randomRange(1, 3),
rotation: randomRange(0, Math.PI * 2),
spin: randomRange(-0.04, 0.04),
});
}
}

function drawPetals() {
ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
petals.forEach((p) => {
ctx.save();
ctx.translate(p.x, p.y);
ctx.rotate(p.rotation);
ctx.fillStyle = p.color;
ctx.beginPath();
ctx.ellipse(0, 0, p.radius, p.radius * 0.45, 0, 0, Math.PI * 2);
ctx.fill();
ctx.restore();
});
}

function updatePetals() {
petals.forEach((p) => {
p.y += p.velocity;
p.x += Math.sin(p.y * 0.015) * 1.5;
p.rotation += p.spin;
if (p.y > window.innerHeight + 20) {
p.y = randomRange(-80, -20);
p.x = randomRange(0, window.innerWidth);
p.velocity = randomRange(1, 3);
}
});
}

function animationLoop() {
drawPetals();
updatePetals();
requestAnimationFrame(animationLoop);
}

window.addEventListener('load', () => {
resizeCanvas();
createPetals();
animationLoop();
});

window.addEventListener('resize', () => {
resizeCanvas();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
