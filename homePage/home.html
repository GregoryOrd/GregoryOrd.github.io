<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Greg Ord's Software Development Portfolio</title>

	<!-- Bootstrap 5 CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="../common/style/main.css"/>
	<link rel="stylesheet" href="../common/style/common-components.css"/>
	<link rel="stylesheet" href="home.css"/>
</head>

<body>
	<div id="common"></div>

	<div class="container-fluid">
		<div class="row" id="CarouselRow">
			<div class="col-lg-2"></div>

			<div class="col-lg-8">
				<div id="IndexCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="4000">

					<!-- Indicators -->
					<div class="carousel-indicators darkIndicators">
						<button type="button" data-bs-target="#IndexCarousel" data-bs-slide-to="0" class="active"></button>
						<button type="button" data-bs-target="#IndexCarousel" data-bs-slide-to="1"></button>
						<button type="button" data-bs-target="#IndexCarousel" data-bs-slide-to="2"></button>
						<button type="button" data-bs-target="#IndexCarousel" data-bs-slide-to="3"></button>
					</div>

					<!-- Slides -->
					<div class="carousel-inner text-center">
						<div class="carousel-item active">
							<img src="HeadShotSunglasses.jpg" class="d-block mx-auto" style="width: 32%;">
						</div>

						<div class="carousel-item">
							<img src="DwyerInviteRacePic.png" class="d-block mx-auto" style="width: 35%;">
						</div>

						<div class="carousel-item">
							<img src="CanWestBanner.jpg" class="d-block mx-auto" style="width: 51%;">
						</div>

						<div class="carousel-item">
							<img src="StampedeWithMom.jpg" class="d-block mx-auto" style="width: 32.9%;">
						</div>
					</div>

					<!-- Controls -->
					<button class="carousel-control-prev" type="button" data-bs-target="#IndexCarousel" data-bs-slide="prev">
						<span class="carousel-control-prev-icon"></span>
						<span class="visually-hidden">Previous</span>
					</button>

					<button class="carousel-control-next" type="button" data-bs-target="#IndexCarousel" data-bs-slide="next">
						<span class="carousel-control-next-icon"></span>
						<span class="visually-hidden">Next</span>
					</button>

				</div>
			</div>

			<div class="col-lg-2"></div>
		</div>

		<div class="row" id="info">
			<div class="col-sm-2"><p> </p></div>
			<div class="col-sm-8">
				<div>
					<h1>Gregory Ord</h1>
					<h4>BSc. Software Engineering</h4>
					<h4>University of Calgary</h4>
				</div>
			</div>
			<div class="col-sm-2"><p> </p></div>
		</div>	
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="../common/js/responsive.js" defer></script>
	<script src="../common/js/loadHtmlElement.js"></script>

	<script>
		loadHtmlElement("../common/html/common-components.html", "common")
	</script>
</body>
</html>
